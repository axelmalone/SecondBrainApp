<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'"
    />
    <title>Second Brain</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, system-ui, sans-serif;
      }
      body {
        margin: 0;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 14px;
        border-bottom: 1px solid rgba(128, 128, 128, 0.3);
      }
      header .path {
        font-size: 12px;
        opacity: 0.7;
        margin-left: auto;
        max-width: 50%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      button {
        font: inherit;
        padding: 6px 12px;
        border-radius: 6px;
        border: 1px solid rgba(128, 128, 128, 0.4);
        background: transparent;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.4;
        cursor: default;
      }
      select,
      input[type="text"],
      input[type="password"] {
        font: inherit;
        padding: 5px 8px;
        border-radius: 6px;
        border: 1px solid rgba(128, 128, 128, 0.4);
        background: transparent;
        color: inherit;
      }
      #main {
        flex: 1;
        display: flex;
        min-height: 0;
      }
      #left {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
        border-right: 1px solid rgba(128, 128, 128, 0.3);
      }
      #editor {
        flex: 1;
        border: none;
        outline: none;
        resize: none;
        padding: 16px;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        font-size: 14px;
        line-height: 1.5;
        background: transparent;
        color: inherit;
      }
      #chat {
        width: 400px;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      #chats-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-bottom: 1px solid rgba(128, 128, 128, 0.3);
      }
      #chats-bar #chats-label {
        font-size: 12px;
        opacity: 0.6;
        margin-left: auto;
      }
      #chat-list {
        max-height: 132px;
        overflow-y: auto;
        border-bottom: 1px solid rgba(128, 128, 128, 0.3);
      }
      .chat-item {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        font-size: 13px;
        cursor: pointer;
      }
      .chat-item:hover {
        background: rgba(128, 128, 128, 0.1);
      }
      .chat-item.active {
        background: rgba(80, 130, 255, 0.16);
      }
      .chat-item .title {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .chat-item .del {
        border: none;
        background: transparent;
        opacity: 0.4;
        padding: 0 4px;
        font-size: 15px;
        line-height: 1;
      }
      .chat-item .del:hover {
        opacity: 1;
      }
      #chat-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-bottom: 1px solid rgba(128, 128, 128, 0.3);
      }
      #chat-bar #model {
        flex: 1;
        min-width: 0;
      }
      #settings {
        display: none;
        flex-direction: column;
        gap: 8px;
        padding: 10px;
        background: rgba(128, 128, 128, 0.08);
        border-bottom: 1px solid rgba(128, 128, 128, 0.3);
      }
      #settings.show {
        display: flex;
      }
      #ground-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        font-size: 13px;
        border-bottom: 1px solid rgba(128, 128, 128, 0.3);
      }
      #ground-bar label {
        display: flex;
        align-items: center;
        gap: 5px;
        cursor: pointer;
      }
      #ground-state {
        margin-left: auto;
        font-size: 12px;
        opacity: 0.7;
      }
      .badge {
        display: inline-block;
        margin-top: 6px;
        padding: 2px 7px;
        border-radius: 999px;
        font-size: 11px;
      }
      .badge.grounded {
        background: rgba(60, 170, 90, 0.22);
      }
      .badge.ungrounded {
        background: rgba(220, 160, 0, 0.22);
      }
      #settings .row {
        display: flex;
        gap: 8px;
      }
      #settings .row input {
        flex: 1;
      }
      #key-state {
        font-size: 12px;
        opacity: 0.7;
      }
      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .msg {
        padding: 8px 11px;
        border-radius: 10px;
        max-width: 88%;
        white-space: pre-wrap;
        word-wrap: break-word;
        font-size: 14px;
        line-height: 1.45;
      }
      .msg.user {
        align-self: flex-end;
        background: rgba(80, 130, 255, 0.18);
      }
      .msg.assistant {
        align-self: flex-start;
        background: rgba(128, 128, 128, 0.16);
      }
      .msg.error {
        align-self: flex-start;
        background: rgba(220, 60, 60, 0.16);
        font-size: 13px;
      }
      .msg .usage {
        display: block;
        margin-top: 5px;
        font-size: 11px;
        opacity: 0.6;
      }
      #composer {
        display: flex;
        gap: 8px;
        padding: 10px;
        border-top: 1px solid rgba(128, 128, 128, 0.3);
      }
      #prompt {
        flex: 1;
        resize: none;
        font: inherit;
        font-size: 14px;
        padding: 8px;
        border-radius: 8px;
        border: 1px solid rgba(128, 128, 128, 0.4);
        background: transparent;
        color: inherit;
      }
      #status {
        padding: 6px 14px;
        font-size: 12px;
        border-top: 1px solid rgba(128, 128, 128, 0.3);
        min-height: 18px;
      }
      #conflict {
        display: none;
        flex-direction: column;
        gap: 8px;
        padding: 12px 14px;
        background: rgba(220, 160, 0, 0.12);
        border-top: 1px solid rgba(220, 160, 0, 0.5);
      }
      #conflict.show {
        display: flex;
      }
      #conflict .row {
        display: flex;
        gap: 8px;
      }
    </style>
  </head>
  <body>
    <header>
      <button id="open">Open note…</button>
      <button id="save" disabled>Save</button>
      <span class="path" id="path"></span>
    </header>

    <div id="main">
      <div id="left">
        <textarea
          id="editor"
          spellcheck="false"
          placeholder="Open a note from your vault to start editing."
          disabled
        ></textarea>

        <section id="conflict">
          <strong>This note changed on disk (e.g. Obsidian saved it).</strong>
          <span>Your unsaved edits and the on-disk version differ. Choose:</span>
          <div class="row">
            <button id="keep-mine">Keep mine</button>
            <button id="take-theirs">Take theirs</button>
            <button id="keep-both">Keep both</button>
          </div>
        </section>
      </div>

      <aside id="chat">
        <div id="chats-bar">
          <button id="new-chat">+ New chat</button>
          <span id="chats-label">Chats</span>
        </div>
        <div id="chat-list"></div>

        <div id="chat-bar">
          <select id="provider">
            <option value="anthropic">Anthropic</option>
            <option value="openai">OpenAI</option>
          </select>
          <input
            id="model"
            type="text"
            value="claude-sonnet-4-5-20250929"
            spellcheck="false"
          />
          <button id="settings-toggle" title="API keys">Key</button>
        </div>

        <section id="settings">
          <div id="key-state">Checking key store…</div>
          <div class="row">
            <input
              id="key-input"
              type="password"
              placeholder="Paste API key for the selected provider"
              spellcheck="false"
            />
            <button id="key-save">Save key</button>
          </div>
        </section>

        <div id="ground-bar">
          <label>
            <input type="checkbox" id="ground-toggle" />
            Ground in vault
          </label>
          <button id="index-btn">Index vault</button>
          <span id="ground-state"></span>
        </div>

        <div id="messages"></div>

        <div id="composer">
          <textarea
            id="prompt"
            rows="2"
            placeholder="Ask anything… (Enter to send, Shift+Enter for newline)"
          ></textarea>
          <button id="send">Send</button>
        </div>
      </aside>
    </div>

    <div id="status"></div>

    <script type="module" src="./renderer.js"></script>
  </body>
</html>
